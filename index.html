<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lector de Puerta Cibertec</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Librería oficial para escaneo en vivo sin restricciones -->
  <script src="https://unpkg.com/html5-qrcode"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    @keyframes laserMove {
      0% { top: 0%; }
      50% { top: 100%; }
      100% { top: 0%; }
    }
    .laser-line {
      position: absolute;
      left: 0;
      width: 100%;
      height: 4px;
      background-color: #ef4444;
      box-shadow: 0 0 14px 4px rgba(239, 68, 68, 0.8);
      z-index: 50;
      animation: laserMove 2s infinite linear;
    }
    #reader video {
      object-fit: cover !important;
      width: 100% !important;
      height: 100% !important;
      border-radius: 1rem;
    }
  </style>
</head>
<body class="bg-slate-900 flex flex-col items-center justify-center min-h-screen p-4 font-sans antialiased">

  <div class="bg-white p-6 rounded-3xl shadow-2xl w-full max-w-sm text-center border border-gray-100">
    <div class="text-xs font-black text-blue-900 tracking-widest uppercase mb-1">CIBERTEC ACCESOS</div>
    <h1 class="text-lg font-bold text-slate-800 mb-4">Lector de Puerta en Vivo</h1>

    <!-- CÁMARA EN VIVO AUTOMÁTICA -->
    <div class="relative bg-black rounded-2xl overflow-hidden aspect-square flex items-center justify-center mb-4 shadow-inner border-4 border-slate-800">
      <div id="laser" class="laser-line"></div>
      <div id="reader" class="w-full h-full"></div>
    </div>

    <!-- Panel de Resultados -->
    <div id="statusPanel" class="bg-slate-50 p-4 rounded-2xl border border-gray-100 text-sm font-bold text-slate-500">
      <i class="fa-solid fa-camera animate-pulse text-blue-500 mr-2"></i> Iniciando cámara en vivo...
    </div>
  </div>

  <script>
    let html5QrCode;
    let escaneando = true;
    
    // 🔴 PEGA AQUÍ TU URL DE GOOGLE APPS SCRIPT QUE TERMINA EN /exec
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzLcMr35GVOc59dWVMxRX7VlPqtwCQPkLjb2rVoiU-Fv5QmBg3667KObzTws6mybicQ3w/exec"; 

    function arrancarCamara() {
      html5QrCode = new Html5Qrcode("reader");
      const config = { fps: 20, qrbox: (w, h) => ({ width: w * 0.7, height: h * 0.7 }) };

      html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess)
        .then(() => {
          const statusPanel = document.getElementById('statusPanel');
          statusPanel.innerHTML = `<i class="fa-solid fa-expand animate-pulse text-emerald-500 mr-2"></i> Apunte hacia un código QR`;
        })
        .catch(err => {
          document.getElementById('statusPanel').innerHTML = `<i class="fa-solid fa-triangle-exclamation text-red-500 mr-2"></i> Error al acceder a la cámara.`;
        });
    }

    function onScanSuccess(decodedText) {
      if (!escaneando) return;
      escaneando = false;

      const statusPanel = document.getElementById('statusPanel');
      const laser = document.getElementById('laser');

      laser.classList.add('hidden');
      statusPanel.className = "bg-blue-50 text-blue-700 p-4 rounded-2xl border border-blue-100 text-sm font-bold flex items-center justify-center gap-2";
      statusPanel.innerHTML = `Validando alumno...`;

      // Enviamos el código mediante FETCH directo a Google Sheets
     fetch(WEB_APP_URL, {
        method: "POST",
        mode: "cors", // Cambiamos a 'cors' para poder recibir la respuesta
        headers: { "Content-Type": "text/plain" },
        body: decodedText
      })
      .then(response => response.json()) // Ahora leemos lo que envía el script
      .then(data => {
        statusPanel.className = "bg-emerald-50 text-emerald-700 border border-emerald-200 p-5 rounded-2xl text-base font-black flex flex-col items-center gap-2";
        statusPanel.innerHTML = `<i class="fa-solid fa-circle-check text-3xl"></i> <span>${data.mensaje}</span>`;
        setTimeout(reiniciarLector, 3000);
      })
      .catch(err => {
        statusPanel.className = "bg-red-50 text-red-700 border border-red-200 p-5 rounded-2xl text-base font-black flex flex-col items-center gap-2";
        statusPanel.innerHTML = `Error de conexión`;
        setTimeout(reiniciarLector, 3000);
      });
    }

    function reiniciarLector() {
      const statusPanel = document.getElementById('statusPanel');
      const laser = document.getElementById('laser');
      statusPanel.className = "bg-slate-50 p-4 rounded-2xl border border-gray-100 text-sm font-bold text-slate-500";
      statusPanel.innerHTML = `<i class="fa-solid fa-expand animate-pulse text-emerald-500 mr-2"></i> Apunte hacia un código QR`;
      laser.classList.remove('hidden');
      escaneando = true;
    }

    window.addEventListener('DOMContentLoaded', arrancarCamara);
  </script>
</body>
</html>
