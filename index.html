<!DOCTYPE html>
<html>
<head>
    <title>Lector Cibertec</title>
    <!-- Incluye aquí tus librerías (ej. html5-qrcode, Tailwind) -->
</head>
<body>

<div id="statusPanel" class="p-4 rounded-xl border font-bold">
    Esperando escaneo...
</div>

<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxAMQ9GxfcyswkjL1-OCpMQTFhZgHDjPyevfTHsobSTR4bzHEFVAjT2xiRFg9Gq0RYB/exec"; // Asegúrate de poner tu URL aquí
    const statusPanel = document.getElementById('statusPanel');

    // Función que se ejecuta cuando el QR es detectado
    function onScanSuccess(decodedText) {
        statusPanel.className = "bg-blue-50 text-blue-700 p-4 rounded-xl border border-blue-200 font-bold";
        statusPanel.innerHTML = "Validando alumno...";

        fetch(WEB_APP_URL, {
            method: "POST",
            mode: "cors", 
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ token: decodedText.trim() }) // Enviamos el token limpio
        })
        .then(response => response.json())
        .then(data => {
            if (data.acceso === true) {
                statusPanel.innerHTML = "¡Acceso concedido!";
                statusPanel.className = "bg-green-100 text-green-700 p-4 rounded-xl border border-green-200 font-bold";
            } else {
                statusPanel.innerHTML = "Error: " + data.mensaje;
                statusPanel.className = "bg-red-100 text-red-700 p-4 rounded-xl border border-red-200 font-bold";
            }
        })
        .catch(error => {
            console.error(error);
            statusPanel.innerHTML = "Error de conexión con el servidor";
            statusPanel.className = "bg-red-100 text-red-700 p-4 rounded-xl border border-red-200 font-bold";
        });
    }
</script>

</body>
</html>
