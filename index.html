<!DOCTYPE html>
<html>
<head>
    <title>Lector de Puerta Cibertec</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Diseño del láser */
        @keyframes laserMove {
            0% { top: 0%; }
            50% { top: 100%; }
            100% { top: 0%; }
        }
        .laser-line {
            position: absolute;
            width: 100%;
            height: 4px;
            background-color: #ef4444;
            animation: laserMove 2s infinite ease-in-out;
            z-index: 10;
        }
        #reader {
            position: relative;
            overflow: hidden;
            border-radius: 1rem;
            border: 2px solid #3b82f6;
        }
    </style>
</head>
<body class="bg-gray-100 p-5">

    <div id="statusPanel" class="p-4 rounded-xl border font-bold mb-4 bg-white shadow-sm">
        Esperando escaneo...
    </div>

    <!-- Contenedor del lector -->
    <div id="reader" class="w-full max-w-sm mx-auto h-80">
        <div class="laser-line"></div>
    </div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxAMQ9GxfcyswkjL1-OCpMQTFhZgHDjPyevfTHsobSTR4bzHEFVAjT2xiRFg9Gq0RYB/exec";
        const statusPanel = document.getElementById('statusPanel');

        function onScanSuccess(decodedText) {
            statusPanel.innerHTML = "Validando alumno...";
            statusPanel.className = "p-4 rounded-xl border font-bold mb-4 bg-blue-100 text-blue-700";

            fetch(WEB_APP_URL, {
                method: "POST",
                mode: "cors",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ token: decodedText.trim() })
            })
            .then(response => response.json())
            .then(data => {
                if (data.acceso === true) {
                    statusPanel.innerHTML = "¡Acceso concedido!";
                    statusPanel.className = "p-4 rounded-xl border font-bold mb-4 bg-green-100 text-green-700";
                } else {
                    statusPanel.innerHTML = "Error: " + data.mensaje;
                    statusPanel.className = "p-4 rounded-xl border font-bold mb-4 bg-red-100 text-red-700";
                }
            })
            .catch(error => {
                statusPanel.innerHTML = "Error de conexión";
                statusPanel.className = "p-4 rounded-xl border font-bold mb-4 bg-red-100 text-red-700";
            });
        }

        // Inicialización manual para respetar tu diseño
        const html5QrCode = new Html5Qrcode("reader");
        html5QrCode.start(
            { facingMode: "environment" },
            { fps: 10, qrbox: { width: 250, height: 250 } },
            (decodedText) => {
                onScanSuccess(decodedText);
                html5QrCode.stop(); // Detenemos para evitar lecturas múltiples
            }
        ).catch(err => {
            statusPanel.innerHTML = "No se pudo acceder a la cámara";
        });
    </script>
</body>
</html>
